openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
paths:
  /auth/login:
    post:
      operationId: loginAdmin
      tags: [auth]
      summary: Log in as admin
      description: Verifies admin credentials and starts an admin session (sets a session cookie)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /auth/logout:
    post:
      operationId: logoutAdmin
      tags: [auth]
      summary: Log out of the admin session
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getAdminSession
      tags: [auth]
      summary: Get current admin session state
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AdminCredentials:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - username
        - password
    AdminSession:
      type: object
      properties:
        isAdmin:
          type: boolean
      required:
        - isAdmin
    AuthError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

