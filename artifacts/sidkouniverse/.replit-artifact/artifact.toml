kind = "web"
previewPath = "/"
title = "SidkoUniverse"
version = "1.0.0"
id = "artifacts/sidkouniverse"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23562

[services.development]
run = "pnpm --filter @workspace/sidkouniverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sidkouniverse", "run", "build" ]
serve = "static"
publicDir = "artifacts/sidkouniverse/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23562"
BASE_PATH = "/"
